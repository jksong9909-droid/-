name: Meta Daily Report

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Run Meta Report
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_PAGE_ID: ${{ secrets.NOTION_PAGE_ID }}
        run: |
          pip install requests
          python3 << 'EOF'
          import requests
          from datetime import datetime, timedelta
          import os

          meta_token = os.environ['META_ACCESS_TOKEN']
          ad_account_id = os.environ['META_AD_ACCOUNT_ID']
          notion_token = os.environ['NOTION_TOKEN']
          notion_page_id = os.environ['NOTION_PAGE_ID']

          today = datetime.now()
          yesterday = (today - timedelta(days=1)).strftime('%Y-%m-%d')
          day_before = (today - timedelta(days=2)).strftime('%Y-%m-%d')
          week_start = (today - timedelta(days=7)).strftime('%Y-%m-%d')
          last_month_start = (today.replace(day=1) - timedelta(days=1)).replace(day=1).strftime('%Y-%m-%d')
          last_month_end = (today.replace(day=1) - timedelta(days=1)).strftime('%Y-%m-%d')
          is_first_day = today.day == 1

          def get_insights(since, until, level='account', fields=None):
              if fields is None:
                  fields = 'spend,impressions,clicks,ctr,cpc,reach,actions,action_values'
              url = f"https://graph.facebook.com/v18.0/{ad_account_id}/insights"
              params = {
                  'access_token': meta_token,
                  'time_range': '{{"since":"{0}","until":"{1}"}}'.format(since, until),
                  'fields': fields,
                  'level': level,
                  'limit': 50
              }
              r = requests.get(url, params=params)
              data = r.json()
              return data.get('data', [])

          def get_val(d, key):
              try:
                  return float(d.get(key, 0) or 0)
              except:
                  return 0

          def get_purchases(d):
              for a in d.get('actions', []):
                  if a['action_type'] == 'purchase':
                      return float(a.get('value', 0))
              return 0

          def get_revenue(d):
              for v in d.get('action_values', []):
                  if v['action_type'] == 'purchase':
                      return float(v.get('value', 0))
              return 0

          def calc_roas(d):
              spend = get_val(d, 'spend')
              revenue = get_revenue(d)
              return revenue / spend if spend > 0 else 0

          def diff_str(curr, prev):
              if prev == 0:
                  return ''
              change = ((curr - prev) / prev) * 100
              arrow = '▲' if change > 0 else '▼'
              return f" ({arrow}{abs(change):.1f}%)"

          def fmt(v):
              return f"₩{v:,.0f}"

          def summarize(data_list):
              if not data_list:
                  return None
              t = {'spend':0,'impressions':0,'clicks':0,'reach':0,'purchases':0,'revenue':0}
              for d in data_list:
                  for k in ['spend','impressions','clicks','reach']:
                      t[k] += get_val(d, k)
                  t['purchases'] += get_purchases(d)
                  t['revenue'] += get_revenue(d)
              t['ctr'] = (t['clicks']/t['impressions']*100) if t['impressions'] > 0 else 0
              t['cpc'] = (t['spend']/t['clicks']) if t['clicks'] > 0 else 0
              t['roas'] = (t['revenue']/t['spend']) if t['spend'] > 0 else 0
              return t

          today_raw = get_insights(yesterday, yesterday)
          prev_raw = get_insights(day_before, day_before)
          week_raw = get_insights(week_start, yesterday)
          campaign_today = get_insights(yesterday, yesterday, level='campaign', fields='campaign_name,spend,impressions,clicks,ctr,cpc,actions,action_values')
          adset_today = get_insights(yesterday, yesterday, level='adset', fields='adset_name,campaign_name,spend,impressions,clicks,ctr,cpc,actions,action_values')
          ad_today = get_insights(yesterday, yesterday, level='ad', fields='ad_name,adset_name,spend,impressions,clicks,ctr,cpc,actions,action_values')
          week_campaign = get_insights(week_start, yesterday, level='campaign', fields='campaign_name,spend,impressions,clicks,actions,action_values')

          today_s = summarize(today_raw)
          prev_s = summarize(prev_raw)
          week_s = summarize(week_raw)

          sections = []

          # 섹션 1: 일간
          s1 = []
          s1.append(f"📊 Meta 광고 통합 리포트 - {yesterday}")
          s1.append("=" * 40)
          s1.append("🗓 [일간] 전일 vs 당일 비교")
          s1.append("-" * 30)
          if today_s:
              p = prev_s or {}
              s1.append(f"지출: {fmt(today_s['spend'])}{diff_str(today_s['spend'], p.get('spend',0))}")
              s1.append(f"매출: {fmt(today_s['revenue'])}{diff_str(today_s['revenue'], p.get('revenue',0))}")
              s1.append(f"ROAS: {today_s['roas']:.2f}{diff_str(today_s['roas'], p.get('roas',0))}")
              s1.append(f"구매: {today_s['purchases']:.0f}건{diff_str(today_s['purchases'], p.get('purchases',0))}")
              s1.append(f"노출: {today_s['impressions']:,.0f}{diff_str(today_s['impressions'], p.get('impressions',0))}")
              s1.append(f"클릭: {today_s['clicks']:,.0f}{diff_str(today_s['clicks'], p.get('clicks',0))}")
              s1.append(f"CTR: {today_s['ctr']:.2f}%{diff_str(today_s['ctr'], p.get('ctr',0))}")
              s1.append(f"CPC: {fmt(today_s['cpc'])}{diff_str(today_s['cpc'], p.get('cpc',0))}")
              s1.append(f"도달: {today_s['reach']:,.0f}")
          else:
              s1.append("어제 데이터 없음")
          sections.append("\n".join(s1))

          # 섹션 2: 캠페인별
          s2 = []
          s2.append("🏆 [캠페인별 성과] 지출 순위")
          s2.append("-" * 30)
          if campaign_today:
              for i, c in enumerate(sorted(campaign_today, key=lambda x: get_val(x,'spend'), reverse=True), 1):
                  spend = get_val(c,'spend')
                  revenue = get_revenue(c)
                  roas = revenue/spend if spend > 0 else 0
                  s2.append(f"{i}. {c.get('campaign_name','N/A')}")
                  s2.append(f"   지출:{fmt(spend)} 매출:{fmt(revenue)} ROAS:{roas:.2f} 구매:{get_purchases(c):.0f}건 CTR:{get_val(c,'ctr'):.2f}%")
          sections.append("\n".join(s2))

          # 섹션 3: 성과 낮은 광고세트
          s3 = []
          s3.append("⚠️ [성과 낮은 광고세트] 개선 필요")
          s3.append("-" * 30)
          if adset_today:
              bottom = sorted([a for a in adset_today if get_val(a,'spend')>0], key=calc_roas)[:3]
              for a in bottom:
                  spend = get_val(a,'spend')
                  roas = calc_roas(a)
                  ctr = get_val(a,'ctr')
                  cpc = get_val(a,'cpc')
                  s3.append(f"📌 {a.get('adset_name','N/A')}")
                  s3.append(f"   지출:{fmt(spend)} ROAS:{roas:.2f} CTR:{ctr:.2f}% CPC:{fmt(cpc)}")
                  if roas < 1:
                      s3.append("   → ROAS 1 미만, 즉시 중단 또는 예산 축소 검토")
                  elif roas < 2:
                      s3.append("   → ROAS 낮음, 타겟 재설정 필요")
                  if ctr < 0.5:
                      s3.append("   → CTR 매우 낮음, 소재 전면 교체 필요")
                  elif ctr < 1:
                      s3.append("   → CTR 저조, A/B 테스트 권장")
                  if cpc > 2000:
                      s3.append("   → CPC 과다, 입찰 전략 조정 필요")
          sections.append("\n".join(s3))

          # 섹션 4: 성과 낮은 광고
          s4 = []
          s4.append("🔻 [성과 낮은 광고] 개선 필요")
          s4.append("-" * 30)
          if ad_today:
              bottom_ads = sorted([a for a in ad_today if get_val(a,'spend')>0], key=calc_roas)[:3]
              for a in bottom_ads:
                  spend = get_val(a,'spend')
                  roas = calc_roas(a)
                  ctr = get_val(a,'ctr')
                  cpc = get_val(a,'cpc')
                  s4.append(f"📌 {a.get('ad_name','N/A')}")
                  s4.append(f"   세트: {a.get('adset_name','N/A')}")
                  s4.append(f"   지출:{fmt(spend)} ROAS:{roas:.2f} CTR:{ctr:.2f}% CPC:{fmt(cpc)}")
                  if roas < 1:
                      s4.append("   → 즉시 OFF 또는 소재 전면 교체 권장")
                  elif ctr < 0.5:
                      s4.append("   → 비주얼/카피 전면 수정 필요")
                  elif cpc > 2000:
                      s4.append("   → 타겟 또는 입찰가 조정 필요")
                  else:
                      s4.append("   → 지속 모니터링")
          sections.append("\n".join(s4))

          # 섹션 5: 주간
          s5 = []
          s5.append(f"📅 [주간] 최근 7일 ({week_start}~{yesterday})")
          s5.append("-" * 30)
          if week_s:
              s5.append(f"총 지출: {fmt(week_s['spend'])}")
              s5.append(f"총 매출: {fmt(week_s['revenue'])}")
              s5.append(f"평균 ROAS: {week_s['roas']:.2f}")
              s5.append(f"총 구매: {week_s['purchases']:.0f}건")
              s5.append(f"평균 CTR: {week_s['ctr']:.2f}%")
              s5.append(f"평균 CPC: {fmt(week_s['cpc'])}")
              s5.append(f"일평균 지출: {fmt(week_s['spend']/7)}")
              s5.append(f"일평균 구매: {week_s['purchases']/7:.1f}건")
              s5.append("")
              if week_campaign:
                  s5.append("주간 캠페인별 성과")
                  for c in sorted(week_campaign, key=lambda x: get_val(x,'spend'), reverse=True):
                      spend = get_val(c,'spend')
                      revenue = get_revenue(c)
                      roas = revenue/spend if spend > 0 else 0
                      s5.append(f"• {c.get('campaign_name','N/A')}: {fmt(spend)} | ROAS {roas:.2f} | 구매 {get_purchases(c):.0f}건")
          sections.append("\n".join(s5))

          # 섹션 6: 월간 (1일만)
          if is_first_day:
              s6 = []
              monthly_raw = get_insights(last_month_start, last_month_end)
              monthly_campaign = get_insights(last_month_start, last_month_end, level='campaign', fields='campaign_name,spend,impressions,clicks,actions,action_values')
              monthly_s = summarize(monthly_raw)
              s6.append(f"📆 [월간] {last_month_start}~{last_month_end}")
              s6.append("-" * 30)
              if monthly_s:
                  s6.append(f"총 지출: {fmt(monthly_s['spend'])}")
                  s6.append(f"총 매출: {fmt(monthly_s['revenue'])}")
                  s6.append(f"평균 ROAS: {monthly_s['roas']:.2f}")
                  s6.append(f"총 구매: {monthly_s['purchases']:.0f}건")
                  s6.append(f"평균 CTR: {monthly_s['ctr']:.2f}%")
                  s6.append(f"평균 CPC: {fmt(monthly_s['cpc'])}")
                  if monthly_campaign:
                      s6.append("")
                      s6.append("월간 캠페인별 성과")
                      for c in sorted(monthly_campaign, key=lambda x: get_val(x,'spend'), reverse=True):
                          spend = get_val(c,'spend')
                          revenue = get_revenue(c)
                          roas = revenue/spend if spend > 0 else 0
                          s6.append(f"• {c.get('campaign_name','N/A')}: {fmt(spend)} | ROAS {roas:.2f} | 구매 {get_purchases(c):.0f}건")
              sections.append("\n".join(s6))

          # 섹션 7: 통합 인사이트
          s7 = []
          s7.append("💡 [통합 인사이트 & 액션 플랜]")
          s7.append("-" * 30)
          if today_s and week_s:
              daily_roas = today_s.get('roas',0)
              weekly_roas = week_s.get('roas',0)
              daily_ctr = today_s.get('ctr',0)
              weekly_ctr = week_s.get('ctr',0)
              daily_cpc = today_s.get('cpc',0)
              weekly_cpc = week_s.get('cpc',0)

              if daily_roas >= 3:
                  s7.append(f"✅ ROAS {daily_roas:.2f} 달성 → 예산 확대 검토 가능")
              elif daily_roas >= 2:
                  s7.append(f"✅ ROAS {daily_roas:.2f} 양호 → 현재 운영 유지")
              elif daily_roas >= 1:
                  s7.append(f"⚠️ ROAS {daily_roas:.2f} 낮음 → 성과 낮은 캠페인 점검 필요")
              else:
                  s7.append(f"🔴 ROAS {daily_roas:.2f} 위험 → 즉시 운영 전반 점검 필요")

              if daily_roas > weekly_roas * 1.1:
                  s7.append(f"✅ 오늘 ROAS가 주간 평균보다 높음 → 현재 방식 유지 권장")
              elif daily_roas < weekly_roas * 0.9:
                  s7.append(f"⚠️ 오늘 ROAS가 주간 평균보다 낮음 → 원인 점검 필요")

              if daily_ctr < weekly_ctr * 0.8:
                  s7.append(f"⚠️ CTR 주간 평균 대비 20% 이상 하락 → 소재 피로도 점검")
              if daily_cpc > weekly_cpc * 1.2:
                  s7.append(f"⚠️ CPC 주간 평균 대비 20% 이상 상승 → 경쟁 강도 확인")

              if prev_s:
                  if today_s['purchases'] > prev_s.get('purchases',0) * 1.5:
                      s7.append(f"✅ 구매 급증 → 성과 좋은 소재/타겟 확대 운영 권장")
                  elif today_s['purchases'] < prev_s.get('purchases',0) * 0.5:
                      s7.append(f"⚠️ 구매 급감 → 랜딩페이지 오류 또는 소재 피로도 점검")

          s7.append("")
          s7.append("📌 오늘의 액션 체크리스트")
          s7.append("□ 성과 낮은 광고세트 예산 조정")
          s7.append("□ CTR 낮은 소재 교체 검토")
          s7.append("□ ROAS 상위 캠페인 예산 확대 검토")
          s7.append("□ 전환율 낮은 랜딩페이지 점검")
          sections.append("\n".join(s7))

          # 노션 전송
          notion_url = "https://api.notion.com/v1/pages"
          headers = {
              'Authorization': 'Bearer ' + notion_token,
              'Content-Type': 'application/json',
              'Notion-Version': '2022-06-28'
          }

          children_blocks = []
          for section in sections:
              children_blocks.append({
                  'object': 'block',
                  'type': 'paragraph',
                  'paragraph': {
                      'rich_text': [{'type': 'text', 'text': {'content': section}}]
                  }
              })

          payload = {
              'parent': {'page_id': notion_page_id},
              'properties': {
                  'title': {
                      'title': [{'text': {'content': 'Meta 리포트 ' + yesterday}}]
                  }
              },
              'children': children_blocks
          }
          r2 = requests.post(notion_url, headers=headers, json=payload)
          print(r2.status_code)
          print(r2.json())
          EOF
