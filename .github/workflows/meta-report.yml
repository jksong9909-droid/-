name: Meta Daily Report

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Run Meta Report
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_PAGE_ID: ${{ secrets.NOTION_PAGE_ID }}
        run: |
          pip install requests
          python3 << 'EOF'
          import requests
          from datetime import datetime, timedelta
          import os

          yesterday = (datetime.now() - timedelta(days=1)).strftime('%Y-%m-%d')
          day_before = (datetime.now() - timedelta(days=2)).strftime('%Y-%m-%d')

          meta_token = os.environ['META_ACCESS_TOKEN']
          ad_account_id = os.environ['META_AD_ACCOUNT_ID']
          notion_token = os.environ['NOTION_TOKEN']
          notion_page_id = os.environ['NOTION_PAGE_ID']

          def get_account_insights(date):
              url = f"https://graph.facebook.com/v18.0/{ad_account_id}/insights"
              params = {
                  'access_token': meta_token,
                  'time_range': '{{"since":"{0}","until":"{0}"}}'.format(date),
                  'fields': 'spend,impressions,clicks,ctr,cpc,reach,actions,action_values',
                  'level': 'account'
              }
              r = requests.get(url, params=params)
              data = r.json()
              if 'data' in data and len(data['data']) > 0:
                  return data['data'][0]
              return None

          def get_campaign_insights(date):
              url = f"https://graph.facebook.com/v18.0/{ad_account_id}/insights"
              params = {
                  'access_token': meta_token,
                  'time_range': '{{"since":"{0}","until":"{0}"}}'.format(date),
                  'fields': 'campaign_name,spend,impressions,clicks,ctr,cpc,actions,action_values',
                  'level': 'campaign'
              }
              r = requests.get(url, params=params)
              data = r.json()
              if 'data' in data:
                  return data['data']
              return []

          def get_value(d, key):
              try:
                  return float(d.get(key, 0))
              except:
                  return 0

          def get_purchases(d):
              actions = d.get('actions', [])
              for a in actions:
                  if a['action_type'] == 'purchase':
                      return float(a['value'])
              return 0

          def get_revenue(d):
              values = d.get('action_values', [])
              for v in values:
                  if v['action_type'] == 'purchase':
                      return float(v['value'])
              return 0

          def diff_str(curr, prev, prefix='', suffix='', is_percent=False):
              if prev == 0:
                  return ''
              change = ((curr - prev) / prev) * 100
              arrow = '▲' if change > 0 else '▼'
              return f" ({arrow}{abs(change):.1f}%)"

          today_data = get_account_insights(yesterday)
          prev_data = get_account_insights(day_before)
          campaigns = get_campaign_insights(yesterday)

          if today_data:
              spend = get_value(today_data, 'spend')
              impressions = get_value(today_data, 'impressions')
              clicks = get_value(today_data, 'clicks')
              ctr = get_value(today_data, 'ctr')
              cpc = get_value(today_data, 'cpc')
              reach = get_value(today_data, 'reach')
              purchases = get_purchases(today_data)
              revenue = get_revenue(today_data)
              roas = revenue / spend if spend > 0 else 0

              p_spend = get_value(prev_data, 'spend') if prev_data else 0
              p_impressions = get_value(prev_data, 'impressions') if prev_data else 0
              p_clicks = get_value(prev_data, 'clicks') if prev_data else 0
              p_ctr = get_value(prev_data, 'ctr') if prev_data else 0
              p_cpc = get_value(prev_data, 'cpc') if prev_data else 0
              p_purchases = get_purchases(prev_data) if prev_data else 0
              p_revenue = get_revenue(prev_data) if prev_data else 0
              p_roas = p_revenue / p_spend if p_spend > 0 else 0

              lines = []
              lines.append(f"📊 Meta 광고 성과 리포트 - {yesterday}\n")
              lines.append("━━━━━━━━━━━━━━━━━━━━━━━━━━━")
              lines.append("💰 전체 성과 요약")
              lines.append("━━━━━━━━━━━━━━━━━━━━━━━━━━━")
              lines.append(f"지출: ₩{spend:,.0f}{diff_str(spend, p_spend)}")
              lines.append(f"매출: ₩{revenue:,.0f}{diff_str(revenue, p_revenue)}")
              lines.append(f"ROAS: {roas:.2f}{diff_str(roas, p_roas)}")
              lines.append(f"구매: {purchases:.0f}건{diff_str(purchases, p_purchases)}")
              lines.append(f"노출: {impressions:,.0f}{diff_str(impressions, p_impressions)}")
              lines.append(f"클릭: {clicks:,.0f}{diff_str(clicks, p_clicks)}")
              lines.append(f"CTR: {ctr:.2f}%{diff_str(ctr, p_ctr)}")
              lines.append(f"CPC: ₩{cpc:,.0f}{diff_str(cpc, p_cpc)}")
              lines.append(f"도달: {reach:,.0f}")
              lines.append("")

              if campaigns:
                  lines.append("━━━━━━━━━━━━━━━━━━━━━━━━━━━")
                  lines.append("🏆 캠페인별 성과")
                  lines.append("━━━━━━━━━━━━━━━━━━━━━━━━━━━")
                  campaigns_sorted = sorted(campaigns, key=lambda x: get_value(x, 'spend'), reverse=True)
                  for c in campaigns_sorted:
                      c_spend = get_value(c, 'spend')
                      c_revenue = get_revenue(c)
                      c_purchases = get_purchases(c)
                      c_roas = c_revenue / c_spend if c_spend > 0 else 0
                      c_ctr = get_value(c, 'ctr')
                      lines.append(f"\n📌 {c.get('campaign_name', 'N/A')}")
                      lines.append(f"  지출: ₩{c_spend:,.0f} | 매출: ₩{c_revenue:,.0f} | ROAS: {c_roas:.2f} | 구매: {c_purchases:.0f}건 | CTR: {c_ctr:.2f}%")
                  lines.append("")

              lines.append("━━━━━━━━━━━━━━━━━━━━━━━━━━━")
              lines.append("✅ 잘된 점")
              lines.append("━━━━━━━━━━━━━━━━━━━━━━━━━━━")
              goods = []
              if roas > 2:
                  goods.append(f"• ROAS {roas:.2f}로 양호한 수준 유지")
              if ctr > 1.5:
                  goods.append(f"• CTR {ctr:.2f}%로 광고 소재 반응 좋음")
              if roas > p_roas and p_roas > 0:
                  goods.append(f"• 전일 대비 ROAS 개선 ({p_roas:.2f} → {roas:.2f})")
              if revenue > p_revenue and p_revenue > 0:
                  goods.append(f"• 전일 대비 매출 증가")
              if not goods:
                  goods.append("• 해당 없음")
              lines.extend(goods)
              lines.append("")

              lines.append("━━━━━━━━━━━━━━━━━━━━━━━━━━━")
              lines.append("⚠️ 아쉬운 점")
              lines.append("━━━━━━━━━━━━━━━━━━━━━━━━━━━")
              bads = []
              if roas < 2:
                  bads.append(f"• ROAS {roas:.2f}로 목표 대비 낮음")
              if ctr < 1:
                  bads.append(f"• CTR {ctr:.2f}%로 광고 소재 반응 저조")
              if cpc > 1000:
                  bads.append(f"• CPC ₩{cpc:,.0f}로 높은 편")
              if roas < p_roas and p_roas > 0:
                  bads.append(f"• 전일 대비 ROAS 하락 ({p_roas:.2f} → {roas:.2f})")
              if not bads:
                  bads.append("• 해당 없음")
              lines.extend(bads)
              lines.append("")

              lines.append("━━━━━━━━━━━━━━━━━━━━━━━━━━━")
              lines.append("🔧 개선 제안")
              lines.append("━━━━━━━━━━━━━━━━━━━━━━━━━━━")
              suggestions = []
              if roas < 2:
                  suggestions.append("• ROAS 개선을 위해 성과 낮은 광고 세트 예산 축소 검토")
              if ctr < 1:
                  suggestions.append("• CTR이 낮은 캠페인 소재 교체 또는 타겟 재설정 필요")
              if cpc > 1000:
                  suggestions.append("• CPC 절감을 위해 광고 품질 점수 개선 또는 입찰가 조정 필요")
              if spend > p_spend * 1.3 and p_spend > 0:
                  suggestions.append("• 전일 대비 지출이 30% 이상 증가, 예산 소진 속도 확인 필요")
              if not suggestions:
                  suggestions.append("• 현재 성과 유지하며 지속 모니터링")
              lines.extend(suggestions)

              content = "\n".join(lines)
          else:
              content = f"Meta 광고 성과 리포트 - {yesterday}\n\n데이터 없음 (휴일 또는 광고 미집행)"

          notion_url = "https://api.notion.com/v1/pages"
          headers = {
              'Authorization': 'Bearer ' + notion_token,
              'Content-Type': 'application/json',
              'Notion-Version': '2022-06-28'
          }
          payload = {
              'parent': {'page_id': notion_page_id},
              'properties': {
                  'title': {
                      'title': [{'text': {'content': 'Meta 리포트 ' + yesterday}}]
                  }
              },
              'children': [
                  {
                      'object': 'block',
                      'type': 'paragraph',
                      'paragraph': {
                          'rich_text': [{'type': 'text', 'text': {'content': content}}]
                      }
                  }
              ]
          }
          r2 = requests.post(notion_url, headers=headers, json=payload)
          print(r2.status_code)
          print(r2.json())
          EOF
