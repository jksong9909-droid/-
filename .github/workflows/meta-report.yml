name: Meta Daily Report

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Run Meta Report
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_PAGE_ID: ${{ secrets.NOTION_PAGE_ID }}
        run: |
          pip install requests
          python3 << 'EOF'
          import requests
          from datetime import datetime, timedelta
          import os

          yesterday = (datetime.now() - timedelta(days=1)).strftime('%Y-%m-%d')
          today = datetime.now().strftime('%Y-%m-%d')

          meta_token = os.environ['META_ACCESS_TOKEN']
          ad_account_id = os.environ['META_AD_ACCOUNT_ID']
          notion_token = os.environ['NOTION_TOKEN']
          notion_page_id = os.environ['NOTION_PAGE_ID']

          url = f"https://graph.facebook.com/v18.0/{ad_account_id}/insights"
          params = {
              'access_token': meta_token,
              'time_range': f'{{"since":"{yesterday}","until":"{yesterday}"}}',
              'fields': 'spend,impressions,clicks,ctr,cpc,reach,frequency,actions',
              'level': 'account'
          }
          r = requests.get(url, params=params)
          data = r.json()

          if 'data' in data and len(data['data']) > 0:
              d = data['data'][0]
              spend = d.get('spend', '0')
              impressions = d.get('impressions', '0')
              clicks = d.get('clicks', '0')
              ctr = d.get('ctr', '0')
              cpc = d.get('cpc', '0')
              reach = d.get('reach', '0')
              
              purchases = 0
              roas = 0
              actions = d.get('actions', [])
              for action in actions:
                  if action['action_type'] == 'purchase':
                      purchases = action['value']
              
              if float(spend) > 0:
                  roas = float(purchases) / float(spend) * 100
              
              content = f"""📊 Meta 광고 성과 리포트 - {yesterday}

💰 지출: ₩{float(spend):,.0f}
👁 노출: {int(impressions):,}
🖱 클릭: {int(clicks):,}
📈 CTR: {float(ctr):.2f}%
💵 CPC: ₩{float(cpc):,.0f}
👥 도달: {int(reach):,}
🛒 구매: {purchases}
📉 ROAS: {roas:.1f}%
"""
          else:
              content = f"📊 Meta 광고 성과 리포트 - {yesterday}\n\n데이터 없음"

          notion_url = "https://api.notion.com/v1/pages"
          headers = {
              'Authorization': f'Bearer {notion_token}',
              'Content-Type': 'application/json',
              'Notion-Version': '2022-06-28'
          }
          payload = {
              'parent': {'page_id': notion_page_id},
              'properties': {
                  'title': {
                      'title': [{'text': {'content': f'Meta 리포트 {yesterday}'}}]
                  }
              },
              'children': [
                  {
                      'object': 'block',
                      'type': 'paragraph',
                      'paragraph': {
                          'rich_text': [{'type': 'text', 'text': {'content': content}}]
                      }
                  }
              ]
          }
          r2 = requests.post(notion_url, headers=headers, json=payload)
          print(r2.json())
          EOF
